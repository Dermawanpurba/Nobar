<!DOCTYPE html>
<html lang="id">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Watch Party (Firebase)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  
  <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body class="bg-gray-950 text-gray-100 font-sans min-h-screen flex flex-col">

  <script>
    const firebaseConfig = {
      // HAPUS CONTOH INI DAN GANTI DENGAN MILIK ANDA DARI FIREBASE CONSOLE
      apiKey: "AIzaSyCWHPqHsra3_ZMvN-yCx1hyIGONuZrMqQE",
      authDomain: "nobar-app-1082a.firebaseapp.com",
      databaseURL: "https://nobar-app-1082a-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "nobar-app-1082a",
      storageBucket: "nobar-app-1082a.firebasestorage.app",
      messagingSenderId: "18399883930",
      appId: "1:18399883930:web:6df694469b478669246523"
    };
    
    // Inisialisasi Firebase
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();
  </script>

  <header class="bg-red-700 border-b border-red-800 p-4 flex items-center justify-between shadow-md">
    <div class="flex items-center gap-3">
      <i class="fa-brands fa-youtube text-white text-2xl"></i>
      <h1 class="text-xl font-bold tracking-tight text-white">Nobar YT Premium</h1>
    </div>
    <div id="roomControls" class="hidden flex items-center gap-4">
      <div class="bg-red-900/50 px-3 py-1.5 rounded-md text-sm flex items-center gap-2 border border-red-600/50">
        <span class="text-red-200 hidden md:inline">ID Ruangan:</span>
        <span id="roomIdDisplay" class="font-mono font-bold text-white select-all">---</span>
        <button onclick="copyRoomId()" class="text-red-200 hover:text-white transition-colors"><i class="fa-regular fa-copy"></i></button>
      </div>
      <button onclick="window.location.reload()" class="bg-gray-900 hover:bg-black text-white px-3 py-1.5 rounded-md text-sm font-medium transition-colors">Keluar</button>
    </div>
  </header>

  <main class="flex-1 relative flex flex-col h-[calc(100vh-68px)]">
    <div id="lobbyView" class="flex-1 flex items-center justify-center p-4 overflow-y-auto">
      <div class="max-w-4xl w-full grid md:grid-cols-2 gap-8">
        
        <div class="bg-gray-900 border border-gray-800 p-8 rounded-2xl shadow-xl flex flex-col items-center text-center">
          <div class="bg-red-500/10 p-5 rounded-full mb-6">
            <i class="fa-brands fa-youtube text-4xl text-red-500"></i>
          </div>
          <h2 class="text-2xl font-bold mb-2">Buat Ruangan (Host)</h2>
          <p class="text-gray-400 mb-8 text-sm">Pilih video YouTube, atur Play & Pause, teman akan otomatis sinkron!</p>
          <button onclick="startHosting()" class="w-full bg-red-600 hover:bg-red-700 text-white font-semibold py-3 rounded-lg shadow-lg">Buat Ruangan</button>
        </div>

        <div class="bg-gray-900 border border-gray-800 p-8 rounded-2xl shadow-xl flex flex-col items-center text-center">
          <div class="bg-emerald-500/10 p-5 rounded-full mb-6">
            <i class="fa-solid fa-users text-3xl text-emerald-500"></i>
          </div>
          <h2 class="text-2xl font-bold mb-2">Gabung Ruangan</h2>
          <p class="text-gray-400 mb-8 text-sm">Masukkan ID dari Tuan Rumah untuk mulai menonton bersama tanpa lag!</p>
          <div class="w-full flex flex-col gap-3">
            <input type="text" id="roomInput" placeholder="Masukkan ID (Cth: ABCD12)" class="w-full bg-gray-950 border border-gray-700 rounded-lg py-3 px-4 text-center font-mono uppercase focus:outline-none focus:border-emerald-500">
            <button onclick="joinRoom()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 rounded-lg shadow-lg">Gabung Menonton</button>
          </div>
        </div>

      </div>
    </div>

    <div id="roomView" class="hidden flex-1 flex flex-col md:flex-row h-full overflow-hidden">
      <div class="flex-1 flex flex-col relative border-r border-gray-800 bg-black">
        
        <div id="ytControlBar" class="hidden bg-gray-900 border-b border-gray-800 p-3 flex gap-2">
          <input type="text" id="ytUrlInput" placeholder="Tempel Link YouTube di sini..." class="flex-1 bg-gray-950 border border-gray-700 rounded-lg px-4 py-2 text-sm focus:border-red-500 outline-none">
          <button onclick="loadNewVideo()" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg text-sm font-medium">Putar</button>
        </div>

        <div class="absolute top-16 left-4 z-20" id="statusOverlay">
          <div class="bg-black/60 px-3 py-1.5 rounded text-sm text-white backdrop-blur flex items-center gap-2">
            <div id="statusDot" class="w-2 h-2 rounded-full bg-yellow-400 animate-pulse"></div>
            <span id="statusText">Menghubungkan ke Server Google...</span>
          </div>
        </div>
        
        <div class="relative flex-1 w-full h-full bg-black flex items-center justify-center">
          <div id="ytPlayerContainer" class="w-full h-full pointer-events-auto z-10 hidden"></div>
          <div id="guestOverlay" class="hidden absolute inset-0 z-20 cursor-not-allowed" title="Hanya Host yang dapat mengontrol video"></div>
          
          <button id="mobilePlayBtn" class="hidden absolute z-30 bg-red-600 text-white px-6 py-3 rounded-full font-bold shadow-lg" onclick="forcePlay()">
            <i class="fa-solid fa-play"></i> Tap untuk Mulai
          </button>
        </div>
      </div>

      <div class="w-full md:w-80 lg:w-96 bg-gray-900 flex flex-col h-[40vh] md:h-full shrink-0">
        <div class="p-4 border-b border-gray-800 flex items-center justify-between">
          <div class="flex items-center gap-2">
            <i class="fa-regular fa-comments text-red-400"></i><h3 class="font-semibold">Live Chat</h3>
          </div>
        </div>
        <div id="chatMessages" class="flex-1 overflow-y-auto p-4 flex flex-col gap-3 scroll-smooth"></div>
        <form id="chatForm" class="p-3 border-t border-gray-800 flex gap-2 bg-gray-950">
          <input type="text" id="chatInput" placeholder="Ketik pesan..." autocomplete="off" class="flex-1 bg-gray-900 border border-gray-700 rounded-full px-4 py-2 text-sm outline-none focus:border-red-500" disabled>
          <button type="submit" id="sendBtn" class="bg-red-600 hover:bg-red-700 disabled:bg-gray-700 text-white w-10 h-10 rounded-full flex shrink-0 items-center justify-center" disabled>
            <i class="fa-solid fa-paper-plane"></i>
          </button>
        </form>
      </div>
    </div>
  </main>

  <script>
    let isHost = false;
    let roomId = '';
    let ytPlayer = null;
    let currentVideoId = '';
    let ignoreYtEvent = false;
    
    // --- Inisialisasi YouTube API Dinamis ---
    if (!window.YT) {
      let tag = document.createElement('script');
      tag.src = "https://www.youtube.com/iframe_api";
      let firstScriptTag = document.getElementsByTagName('script')[0];
      firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
    }

    function initYouTubePlayer(videoId) {
      if (ytPlayer) {
        ytPlayer.loadVideoById(videoId);
        return;
      }
      document.getElementById('ytPlayerContainer').classList.remove('hidden');
      ytPlayer = new YT.Player('ytPlayerContainer', {
        height: '100%',
        width: '100%',
        videoId: videoId,
        playerVars: {
          'autoplay': 1,
          'controls': isHost ? 1 : 0, 
          'disablekb': isHost ? 0 : 1,
          'rel': 0
        },
        events: {
          'onReady': (e) => {
            if (!isHost) {
              e.target.mute(); 
              e.target.playVideo();
              document.getElementById('mobilePlayBtn').classList.remove('hidden');
            }
          },
          'onStateChange': onHostYtStateChange
        }
      });
    }

    // --- Firebase Sync Logic ---
    function sendSyncData(command, time, videoId) {
      if (isHost && roomId) {
        db.ref('rooms/' + roomId + '/state').set({
          command: command,
          time: time,
          videoId: videoId,
          timestamp: Date.now()
        });
      }
    }

    function listenToSyncData() {
      db.ref('rooms/' + roomId + '/state').on('value', (snapshot) => {
        const data = snapshot.val();
        if (data && !isHost) handleYtSync(data);
      });
    }

    function onHostYtStateChange(event) {
      if (!isHost || ignoreYtEvent) return;
      const time = ytPlayer.getCurrentTime();
      if (event.data == YT.PlayerState.PLAYING) sendSyncData('PLAY', time, currentVideoId);
      if (event.data == YT.PlayerState.PAUSED) sendSyncData('PAUSE', time, currentVideoId);
      if (event.data == YT.PlayerState.BUFFERING) sendSyncData('PAUSE', time, currentVideoId); 
    }

    function handleYtSync(data) {
      if (!ytPlayer && data.videoId) {
        currentVideoId = data.videoId;
        initYouTubePlayer(data.videoId);
      }
      if (!ytPlayer) return;

      if (data.videoId && data.videoId !== currentVideoId) {
        currentVideoId = data.videoId;
        ytPlayer.loadVideoById(data.videoId);
      }

      ignoreYtEvent = true;
      const currentTime = ytPlayer.getCurrentTime();
      if (Math.abs(currentTime - data.time) > 2) {
        ytPlayer.seekTo(data.time, true);
      }

      if (data.command === 'PLAY') ytPlayer.playVideo();
      if (data.command === 'PAUSE') ytPlayer.pauseVideo();
      setTimeout(() => ignoreYtEvent = false, 500);
    }

    function extractVideoID(url) {
      var regExp = /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?))\??v?=?([^#&?]*).*/;
      var match = url.match(regExp);
      return (match && match[7].length == 11) ? match[7] : false;
    }

    function loadNewVideo() {
      const url = document.getElementById('ytUrlInput').value;
      const vid = extractVideoID(url);
      if (vid) {
        currentVideoId = vid;
        initYouTubePlayer(vid);
        setTimeout(() => sendSyncData('LOAD', 0, vid), 1000);
        document.getElementById('ytUrlInput').value = '';
      } else {
        alert("Link YouTube tidak valid!");
      }
    }

    // --- Firebase Chat Logic ---
    function listenToChat() {
      db.ref('rooms/' + roomId + '/chat').on('child_added', (snapshot) => {
        const msg = snapshot.val();
        appendChat(msg.text, msg.sender, msg.senderId === firebase.auth().currentUser?.uid || msg.senderId === socketIdLocal);
      });
    }

    // Identitas palsu untuk chat
    const socketIdLocal = Math.random().toString(36).substring(7);

    document.getElementById('chatForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const text = document.getElementById('chatInput').value.trim();
      if (!text || !roomId) return;

      db.ref('rooms/' + roomId + '/chat').push({
        text: text,
        sender: isHost ? 'Host' : 'Guest',
        senderId: socketIdLocal,
        timestamp: Date.now()
      });
      document.getElementById('chatInput').value = '';
    });

    function appendChat(text, sender, isMe) {
      const align = isMe ? 'items-end' : 'items-start';
      const bgColor = isMe ? 'bg-red-600 text-white rounded-tr-none' : 'bg-gray-800 text-gray-200 rounded-tl-none';
      const name = isMe ? 'Anda' : sender;
      
      const msgHtml = `<div class="flex flex-col ${align} animate-fade-in"><span class="text-[10px] text-gray-500 mb-1 px-1">${name}</span><div class="px-3 py-2 rounded-lg max-w-[85%] text-sm shadow-sm ${bgColor} break-words">${text}</div></div>`;
      const box = document.getElementById('chatMessages');
      box.insertAdjacentHTML('beforeend', msgHtml);
      box.scrollTop = box.scrollHeight;
    }

    // --- Hosting / Joining ---
    function setStatus(text, color = 'bg-emerald-500') {
      document.getElementById('statusText').innerText = text;
      document.getElementById('statusDot').className = `w-2 h-2 rounded-full ${color} animate-pulse`;
    }

    function switchView() {
      document.getElementById('lobbyView').classList.add('hidden');
      document.getElementById('roomView').classList.remove('hidden');
      document.getElementById('roomControls').classList.remove('hidden');
      document.getElementById('roomIdDisplay').innerText = roomId;
      document.getElementById('chatInput').disabled = false;
      document.getElementById('sendBtn').disabled = false;
    }

    function startHosting() {
      if (!window.YT || !window.YT.Player) {
         alert("Memuat YouTube. Tunggu 2 detik dan klik lagi."); return;
      }
      isHost = true;
      roomId = Math.random().toString(36).substring(2, 8).toUpperCase();
      
      switchView();
      document.getElementById('ytControlBar').classList.remove('hidden');
      setStatus('Ruangan dibuat. Bagikan ID ke teman!', 'bg-emerald-500');
      
      // Bersihkan data lama jika ada bentrok ID (jarang terjadi)
      db.ref('rooms/' + roomId).remove(); 
      listenToChat();
      
      // Sync heartbeat host ke Firebase
      setInterval(() => {
        if (ytPlayer && ytPlayer.getPlayerState() === 1) {
          sendSyncData('SYNC', ytPlayer.getCurrentTime(), currentVideoId);
        }
      }, 4000);
    }

    function joinRoom() {
      let input = document.getElementById('roomInput').value.toUpperCase().replace(/\s/g, '');
      if (!input) return;
      
      isHost = false;
      roomId = input;
      
      switchView();
      document.getElementById('guestOverlay').classList.remove('hidden');
      setStatus('Terhubung! Menunggu video dari Host...', 'bg-emerald-500');
      
      listenToSyncData();
      listenToChat();
    }

    function copyRoomId() {
      navigator.clipboard.writeText(roomId).then(() => alert('ID Ruangan disalin!'));
    }

    function forcePlay() {
      if (ytPlayer) {
        ytPlayer.unMute();
        ytPlayer.playVideo();
      }
      document.getElementById('mobilePlayBtn').classList.add('hidden');
    }
  </script>
</body>
</html>
